<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마가복음 퀴즈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ===== 인트로 오버레이 (빛이 모이는 임팩트) ===== -->
    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-sky"></div>
        <div class="intro-particles">
            <i style="--sx:-45vw;--sy:-40vh;--d:0s"></i>
            <i style="--sx:-25vw;--sy:-48vh;--d:.05s"></i>
            <i style="--sx:2vw;--sy:-50vh;--d:.10s"></i>
            <i style="--sx:25vw;--sy:-46vh;--d:.15s"></i>
            <i style="--sx:45vw;--sy:-38vh;--d:.20s"></i>
            <i style="--sx:50vw;--sy:-15vh;--d:.25s"></i>
            <i style="--sx:48vw;--sy:8vh;--d:.30s"></i>
            <i style="--sx:45vw;--sy:28vh;--d:.35s"></i>
            <i style="--sx:34vw;--sy:45vh;--d:.40s"></i>
            <i style="--sx:14vw;--sy:50vh;--d:.45s"></i>
            <i style="--sx:-6vw;--sy:48vh;--d:.50s"></i>
            <i style="--sx:-25vw;--sy:42vh;--d:.55s"></i>
            <i style="--sx:-42vw;--sy:30vh;--d:.60s"></i>
            <i style="--sx:-50vw;--sy:5vh;--d:.65s"></i>
            <i style="--sx:-48vw;--sy:-15vh;--d:.70s"></i>
            <i style="--sx:-36vw;--sy:-28vh;--d:.22s"></i>
            <i style="--sx:28vw;--sy:32vh;--d:.28s"></i>
            <i style="--sx:-18vw;--sy:35vh;--d:.38s"></i>
            <i style="--sx:18vw;--sy:-34vh;--d:.12s"></i>
            <i style="--sx:-14vw;--sy:-22vh;--d:.18s"></i>
        </div>
        <div class="intro-shine"></div>
        <div class="intro-flash"></div>
        <div class="intro-cross-wrap">
            <svg class="intro-cross" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="intro-gold" x1="0" x2="0" y1="0" y2="1">
                        <stop offset="0" stop-color="#fff2b8"/>
                        <stop offset=".45" stop-color="#f5d060"/>
                        <stop offset="1" stop-color="#b8902a"/>
                    </linearGradient>
                </defs>
                <rect x="42" y="8" width="16" height="124" rx="3" fill="url(#intro-gold)"/>
                <rect x="16" y="46" width="68" height="16" rx="3" fill="url(#intro-gold)"/>
                <rect x="46" y="12" width="4" height="116" rx="1.5" fill="#fff5c8" opacity="0.55"/>
                <rect x="20" y="49" width="60" height="4" rx="1.5" fill="#fff5c8" opacity="0.45"/>
            </svg>
        </div>
        <div class="intro-text">
            <h1>&#x271E; 마가복음 퀴즈</h1>
            <p>말씀 속으로 들어가세요</p>
        </div>
        <button type="button" class="intro-skip" id="intro-skip">SKIP &raquo;</button>
    </div>

    <!-- 배경 빛 아우라 효과 -->
    <div class="aura-bg"></div>
    <!-- 성령의 빛 파티클 -->
    <div class="spirit-particles"></div>

    <!-- 시작 화면 -->
    <div id="start-screen" class="screen active">
        <div class="bible-book">
            <div class="book-spine"></div>
            <div class="book-page">
                <div class="page-ornament top"></div>
                <h1>&#x271E; 마가복음 퀴즈</h1>
                <p class="subtitle">마가복음 1장~16장을 깊이 공부해보세요!</p>
                <div class="bible-illustration start-illust">
                    <svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <radialGradient id="divine-glow" cx="50%" cy="20%" r="50%">
                                <stop offset="0%" stop-color="#f0c040" stop-opacity="0.5"/>
                                <stop offset="50%" stop-color="#f0c040" stop-opacity="0.15"/>
                                <stop offset="100%" stop-color="#f0c040" stop-opacity="0"/>
                            </radialGradient>
                            <linearGradient id="cross-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#d4a030"/>
                                <stop offset="50%" stop-color="#f0c040"/>
                                <stop offset="100%" stop-color="#b8902a"/>
                            </linearGradient>
                            <linearGradient id="page-l" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#e0cca8"/>
                                <stop offset="100%" stop-color="#f2e2c4"/>
                            </linearGradient>
                            <linearGradient id="page-r" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#f5ecd8"/>
                                <stop offset="100%" stop-color="#e8dbc0"/>
                            </linearGradient>
                            <linearGradient id="cover-g" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#6b4a2e"/>
                                <stop offset="100%" stop-color="#4a3320"/>
                            </linearGradient>
                        </defs>

                        <!-- 신성한 빛 배경 -->
                        <ellipse cx="100" cy="45" rx="80" ry="55" fill="url(#divine-glow)">
                            <animate attributeName="rx" values="75;85;75" dur="4s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
                        </ellipse>

                        <!-- 빛줄기 -->
                        <g opacity="0.2">
                            <line x1="100" y1="5" x2="30" y2="170" stroke="#f0c040" stroke-width="0.8"/>
                            <line x1="100" y1="5" x2="55" y2="170" stroke="#f0c040" stroke-width="1.2"/>
                            <line x1="100" y1="5" x2="80" y2="170" stroke="#f0c040" stroke-width="1.5"/>
                            <line x1="100" y1="5" x2="120" y2="170" stroke="#f0c040" stroke-width="1.5"/>
                            <line x1="100" y1="5" x2="145" y2="170" stroke="#f0c040" stroke-width="1.2"/>
                            <line x1="100" y1="5" x2="170" y2="170" stroke="#f0c040" stroke-width="0.8"/>
                        </g>

                        <!-- 십자가 -->
                        <g transform="translate(86, 2)">
                            <rect x="8" y="0" width="14" height="52" rx="2.5" fill="url(#cross-grad)"/>
                            <rect x="-2" y="13" width="34" height="12" rx="2.5" fill="url(#cross-grad)"/>
                            <rect x="12" y="2" width="4" height="46" rx="1" fill="#f5d060" opacity="0.35"/>
                            <rect x="1" y="16" width="28" height="4" rx="1" fill="#f5d060" opacity="0.25"/>
                            <circle cx="15" cy="19" r="22" fill="#f0c040" opacity="0.08">
                                <animate attributeName="r" values="18;24;18" dur="3s" repeatCount="indefinite"/>
                            </circle>
                        </g>

                        <!-- 비둘기 -->
                        <g transform="translate(48, 30) scale(0.8)" fill="#f5ecd8" stroke="#c9a96e" stroke-width="0.7">
                            <ellipse cx="18" cy="17" rx="9" ry="6"/>
                            <circle cx="26" cy="12" r="4.5"/>
                            <path d="M30 12 L35 11 L31 13.5 Z" fill="#d4a030" stroke="none"/>
                            <circle cx="27.5" cy="11" r="0.9" fill="#5a3e28"/>
                            <circle cx="27" cy="10.5" r="0.3" fill="#f5ecd8"/>
                            <path d="M14 14 Q4 5 -2 1 Q7 7 11 11 Z" fill="#ebe0cc"/>
                            <path d="M13 15 Q1 9 -5 4 Q5 11 10 13 Z" fill="#e5d8c0"/>
                            <path d="M12 16 Q-1 12 -6 7 Q4 14 9 15 Z" fill="#ddd0b8"/>
                            <path d="M8 19 Q3 24 0 27 Q5 22 8 21 Z" fill="#ebe0cc"/>
                            <path d="M30 13 Q35 15 38 14" fill="none" stroke="#7a9a40" stroke-width="0.7"/>
                            <ellipse cx="37" cy="12.5" rx="2.8" ry="1.3" fill="#8ab050" transform="rotate(-15 37 12.5)"/>
                            <ellipse cx="40" cy="13.5" rx="2.2" ry="1" fill="#8ab050" transform="rotate(10 40 13.5)"/>
                        </g>

                        <!-- 펼쳐진 성경책 -->
                        <g transform="translate(30, 75)">
                            <path d="M68 5 Q38 -2 8 8 L5 78 Q38 68 68 73 Z" fill="url(#cover-g)" stroke="#3a2515" stroke-width="1"/>
                            <path d="M72 5 Q102 -2 132 8 L135 78 Q102 68 72 73 Z" fill="url(#cover-g)" stroke="#3a2515" stroke-width="1"/>
                            <path d="M70 8 Q42 2 14 12 L14 75 Q42 65 70 70 Z" fill="url(#page-l)" stroke="#c9a96e" stroke-width="1"/>
                            <path d="M70 8 Q98 2 126 12 L126 75 Q98 65 70 70 Z" fill="url(#page-r)" stroke="#c9a96e" stroke-width="1"/>
                            <path d="M68 8 L68 70 L72 70 L72 8 Z" fill="#b08840" opacity="0.3"/>
                            <g opacity="0.35" stroke="#a08060" stroke-width="0.7">
                                <line x1="24" y1="22" x2="60" y2="20"/>
                                <line x1="24" y1="29" x2="58" y2="27"/>
                                <line x1="24" y1="36" x2="54" y2="34"/>
                                <line x1="24" y1="43" x2="60" y2="41"/>
                                <line x1="24" y1="50" x2="52" y2="48"/>
                                <line x1="24" y1="57" x2="57" y2="55"/>
                            </g>
                            <g opacity="0.35" stroke="#a08060" stroke-width="0.7">
                                <line x1="80" y1="20" x2="116" y2="22"/>
                                <line x1="80" y1="27" x2="114" y2="29"/>
                                <line x1="80" y1="34" x2="110" y2="36"/>
                                <line x1="80" y1="41" x2="116" y2="43"/>
                                <line x1="80" y1="48" x2="108" y2="50"/>
                                <line x1="80" y1="55" x2="113" y2="57"/>
                            </g>
                        </g>

                        <!-- 반짝이는 별 -->
                        <circle cx="35" cy="50" r="1.5" fill="#f0c040" opacity="0.5">
                            <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.5s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="165" cy="60" r="1.2" fill="#f0c040" opacity="0.6">
                            <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="150" cy="28" r="1" fill="#f0c040" opacity="0.4">
                            <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="42" cy="100" r="1.3" fill="#f0c040" opacity="0.5">
                            <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.2s" repeatCount="indefinite"/>
                        </circle>
                        <text x="28" y="75" font-size="6" fill="#f0c040" opacity="0.35" font-family="serif">&#x2726;</text>
                        <text x="168" y="88" font-size="5" fill="#f0c040" opacity="0.3" font-family="serif">&#x2726;</text>
                    </svg>
                </div>
                <div class="mode-select">
                    <h3>난이도 선택</h3>
                    <div class="btn-group">
                        <button class="mode-btn selected" data-difficulty="easy">&#x1F331; 쉬움</button>
                        <button class="mode-btn" data-difficulty="hard">&#x1F525; 어려움</button>
                    </div>
                </div>
                <button id="start-btn" class="primary-btn">퀴즈 시작</button>
                <button id="exam-btn" class="secondary-btn exam-btn">&#x1F4DC; 기출문제 풀기</button>
                <div class="page-ornament bottom"></div>
            </div>
        </div>
    </div>

    <!-- 퀴즈 화면 -->
    <div id="quiz-screen" class="screen">
        <div class="bible-book">
            <div class="book-spine"></div>
            <div class="book-page" id="quiz-page">
                <div class="page-ornament top"></div>
                <div class="quiz-header">
                    <div class="progress-info">
                        <span id="question-number">1 / 10</span>
                        <span id="score-display">점수: 0</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div id="timer" class="timer">30</div>
                </div>
                <div class="quiz-body">
                    <p id="question-text" class="question-text"></p>
                    <div id="options" class="options"></div>
                    <div id="subjective-area" class="subjective-area hidden">
                        <input type="text" id="subjective-input" class="subjective-input" placeholder="정답을 입력하세요..." autocomplete="off">
                        <button id="submit-answer-btn" class="primary-btn submit-btn">정답 제출</button>
                    </div>
                </div>
                <div id="feedback" class="feedback hidden">
                    <p id="feedback-text"></p>
                    <p id="bible-verse" class="bible-verse"></p>
                    <button id="next-btn" class="primary-btn">다음 문제</button>
                </div>
                <div class="page-ornament bottom"></div>
            </div>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="screen">
        <div class="bible-book result-book">
            <div class="book-spine"></div>
            <div class="book-page">
                <div class="page-ornament top"></div>

                <!-- 천사 은총 일러스트 -->
                <div class="blessing-illustration">
                    <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <radialGradient id="glory-light" cx="50%" cy="25%" r="55%">
                                <stop offset="0%" stop-color="#f0c040" stop-opacity="0.45"/>
                                <stop offset="40%" stop-color="#f0c040" stop-opacity="0.12"/>
                                <stop offset="100%" stop-color="#f0c040" stop-opacity="0"/>
                            </radialGradient>
                            <linearGradient id="wing-l" x1="100%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#f5ecd8"/>
                                <stop offset="100%" stop-color="#ddd0b8"/>
                            </linearGradient>
                            <linearGradient id="wing-r" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#f5ecd8"/>
                                <stop offset="100%" stop-color="#ddd0b8"/>
                            </linearGradient>
                            <linearGradient id="robe-g" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#f5ecd8"/>
                                <stop offset="100%" stop-color="#e0d0b0"/>
                            </linearGradient>
                        </defs>

                        <!-- 영광의 빛 -->
                        <ellipse cx="100" cy="45" rx="90" ry="55" fill="url(#glory-light)">
                            <animate attributeName="rx" values="85;95;85" dur="4s" repeatCount="indefinite"/>
                        </ellipse>

                        <!-- 빛줄기 -->
                        <g class="light-rays" opacity="0.18">
                            <line x1="100" y1="0" x2="20" y2="160" stroke="#f0c040" stroke-width="0.8"/>
                            <line x1="100" y1="0" x2="45" y2="160" stroke="#f0c040" stroke-width="1"/>
                            <line x1="100" y1="0" x2="70" y2="160" stroke="#f0c040" stroke-width="1.3"/>
                            <line x1="100" y1="0" x2="130" y2="160" stroke="#f0c040" stroke-width="1.3"/>
                            <line x1="100" y1="0" x2="155" y2="160" stroke="#f0c040" stroke-width="1"/>
                            <line x1="100" y1="0" x2="180" y2="160" stroke="#f0c040" stroke-width="0.8"/>
                        </g>

                        <!-- 천사 -->
                        <g transform="translate(100, 18)">
                            <!-- 후광 -->
                            <ellipse cx="0" cy="-3" rx="14" ry="5" fill="none" stroke="#f0c040" stroke-width="1.5" opacity="0.6">
                                <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
                            </ellipse>

                            <!-- 왼쪽 날개 -->
                            <g transform="translate(-12, 16)">
                                <path d="M0 0 Q-14 -14 -32 -22 Q-28 -8 -23 2 Q-18 10 -13 14 Q-8 17 -4 16 Z"
                                      fill="url(#wing-l)" stroke="#c9a96e" stroke-width="0.6"/>
                                <path d="M-4 6 Q-14 -4 -26 -13" fill="none" stroke="#d4c4a0" stroke-width="0.5" opacity="0.5"/>
                                <path d="M-3 9 Q-11 1 -20 -6" fill="none" stroke="#d4c4a0" stroke-width="0.4" opacity="0.4"/>
                                <path d="M-2 13 Q-9 6 -16 1" fill="none" stroke="#d4c4a0" stroke-width="0.4" opacity="0.3"/>
                            </g>

                            <!-- 오른쪽 날개 -->
                            <g transform="translate(12, 16)">
                                <path d="M0 0 Q14 -14 32 -22 Q28 -8 23 2 Q18 10 13 14 Q8 17 4 16 Z"
                                      fill="url(#wing-r)" stroke="#c9a96e" stroke-width="0.6"/>
                                <path d="M4 6 Q14 -4 26 -13" fill="none" stroke="#d4c4a0" stroke-width="0.5" opacity="0.5"/>
                                <path d="M3 9 Q11 1 20 -6" fill="none" stroke="#d4c4a0" stroke-width="0.4" opacity="0.4"/>
                                <path d="M2 13 Q9 6 16 1" fill="none" stroke="#d4c4a0" stroke-width="0.4" opacity="0.3"/>
                            </g>

                            <!-- 얼굴 -->
                            <circle cx="0" cy="7" r="9.5" fill="#f5e6c8" stroke="#c9a96e" stroke-width="0.7"/>
                            <!-- 머리카락 -->
                            <path d="M-7 3 Q-9 -3 -4 -5 Q0 -7 4 -5 Q9 -3 7 3" fill="#c9a96e" stroke="none" opacity="0.5"/>
                            <!-- 눈 -->
                            <ellipse cx="-3.2" cy="7" rx="1.1" ry="1.4" fill="#5a3e28"/>
                            <ellipse cx="3.2" cy="7" rx="1.1" ry="1.4" fill="#5a3e28"/>
                            <circle cx="-2.8" cy="6.5" r="0.35" fill="#f5e6c8"/>
                            <circle cx="3.6" cy="6.5" r="0.35" fill="#f5e6c8"/>
                            <!-- 미소 -->
                            <path d="M-2.5 11 Q0 13 2.5 11" fill="none" stroke="#b08860" stroke-width="0.6"/>
                            <!-- 볼 터치 -->
                            <circle cx="-5.5" cy="10" r="1.8" fill="#e8a080" opacity="0.25"/>
                            <circle cx="5.5" cy="10" r="1.8" fill="#e8a080" opacity="0.25"/>

                            <!-- 몸/의복 -->
                            <path d="M-11 17 Q-13 48 -16 78 L16 78 Q13 48 11 17 Q7 15 0 16 Q-7 15 -11 17 Z"
                                  fill="url(#robe-g)" stroke="#c9a96e" stroke-width="0.7"/>
                            <path d="M-4 23 Q-2 48 -5 73" fill="none" stroke="#c9a96e" stroke-width="0.4" opacity="0.35"/>
                            <path d="M4 23 Q2 48 5 73" fill="none" stroke="#c9a96e" stroke-width="0.4" opacity="0.35"/>
                            <path d="M0 19 Q-0.5 48 0 76" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.25"/>

                            <!-- 팔 -->
                            <path d="M-11 28 Q-18 33 -23 30 Q-20 36 -11 33" fill="url(#robe-g)" stroke="#c9a96e" stroke-width="0.5"/>
                            <path d="M11 28 Q18 33 23 30 Q20 36 11 33" fill="url(#robe-g)" stroke="#c9a96e" stroke-width="0.5"/>
                            <!-- 손 -->
                            <circle cx="-23" cy="31" r="2.8" fill="#f5e6c8" stroke="#c9a96e" stroke-width="0.4"/>
                            <circle cx="23" cy="31" r="2.8" fill="#f5e6c8" stroke="#c9a96e" stroke-width="0.4"/>
                        </g>

                        <!-- 비둘기 (우측 하단) -->
                        <g transform="translate(148, 95) scale(0.55)" fill="#f5ecd8" stroke="#c9a96e" stroke-width="0.6">
                            <ellipse cx="0" cy="0" rx="8" ry="5"/>
                            <circle cx="7" cy="-3" r="3.5"/>
                            <path d="M10 -3 L14 -4 L11 -2 Z" fill="#d4a030" stroke="none"/>
                            <circle cx="8" cy="-3.5" r="0.6" fill="#5a3e28"/>
                            <path d="M-4 -2 Q-12 -8 -15 -12 Q-8 -5 -3 -1 Z" fill="#ebe0cc"/>
                            <path d="M-5 0 Q-14 -5 -18 -8 Q-10 -2 -4 1 Z" fill="#e5d8c0"/>
                        </g>

                        <!-- 작은 십자가 (좌측 하단) -->
                        <g transform="translate(48, 108) scale(0.5)">
                            <rect x="0" y="0" width="8" height="28" rx="1.5" fill="#c9a96e" opacity="0.45"/>
                            <rect x="-5" y="7" width="18" height="7" rx="1.5" fill="#c9a96e" opacity="0.45"/>
                        </g>

                        <!-- 반짝이 -->
                        <g class="sparkles">
                            <text x="28" y="45" font-size="7" fill="#f0c040" opacity="0.4" font-family="serif">&#x2726;</text>
                            <text x="168" y="55" font-size="5" fill="#f0c040" opacity="0.35" font-family="serif">&#x2726;</text>
                            <text x="38" y="95" font-size="6" fill="#f0c040" opacity="0.45" font-family="serif">&#x2726;</text>
                            <text x="158" y="130" font-size="5" fill="#f0c040" opacity="0.3" font-family="serif">&#x2726;</text>
                            <text x="75" y="135" font-size="4" fill="#f0c040" opacity="0.35" font-family="serif">&#x2726;</text>
                            <text x="125" y="140" font-size="6" fill="#f0c040" opacity="0.4" font-family="serif">&#x2726;</text>
                        </g>
                        <circle cx="30" cy="65" r="1.3" fill="#f0c040" opacity="0.5">
                            <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.5s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="170" cy="75" r="1" fill="#f0c040" opacity="0.4">
                            <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/>
                        </circle>
                    </svg>
                </div>

                <h2>퀴즈 결과</h2>
                <div class="result-circle">
                    <span id="result-score">0</span>
                    <span class="result-total">/ 10</span>
                </div>
                <p id="result-message" class="result-message"></p>
                <div id="result-details" class="result-details"></div>
